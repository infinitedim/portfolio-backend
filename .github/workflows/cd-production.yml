# ============================================================================
# CD Pipeline - Backend Production (portfolio-backend)
# Builds the release binary and uploads it as a workflow artifact.
# ============================================================================

name: CD - Production

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: backend-production
  cancel-in-progress: false

jobs:
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Upload release binary
        uses: actions/upload-artifact@v6
        with:
          name: portfolio-backend-binary
          path: target/release/portfolio-backend
          retention-days: 7

  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-release
    if: |
      (github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy to Railway
        run: railway up --detach --service portfolio-backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for deployment and verify health
        run: |
          echo "Waiting 90s for Railway to build and start the new deployment..."
          sleep 90
          curl \
            --fail \
            --retry 10 \
            --retry-delay 15 \
            --retry-connrefused \
            --max-time 30 \
            "https://${{ secrets.RAILWAY_PUBLIC_DOMAIN }}/health"
          echo "Health check passed — deployment is live."
