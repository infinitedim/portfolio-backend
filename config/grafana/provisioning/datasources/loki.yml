apiVersion: 1

datasources:
  - name: Loki
    uid: loki-main
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: true
    jsonData:
      maxLines: 1000
      timeout: 60
      derivedFields:
        - datasourceUid: loki-main
          matcherRegex: "request_id=(\\w+)"
          name: RequestID
          url: "$${__value.raw}"
