global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: portfolio
    environment: production

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Cloud Run backend — replace CLOUD_RUN_URL after first deploy.
  # Example: portfolio-backend-abc123-as.a.run.app
  - job_name: portfolio-backend
    scheme: https
    authorization:
      type: Bearer
      credentials: ${METRICS_BEARER_TOKEN}
    static_configs:
      - targets: ["CLOUD_RUN_URL"]
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
    metrics_path: /metrics
    scrape_interval: 30s
